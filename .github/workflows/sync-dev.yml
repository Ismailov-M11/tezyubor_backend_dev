name: Sync dev → personal dev repo

on:
  push:
    branches: [dev]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove org workflows
        run: rm -rf .github/workflows/

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Commit workflow removal
        run: |
          git add -A
          git diff --staged --quiet || git commit -m "chore: strip workflows for dev sync"

      - name: Push to personal dev repo
        env:
          TOKEN: ${{ secrets.DEV_SYNC_TOKEN }}
        run: |
          git remote add personal "https://x-access-token:${TOKEN}@github.com/Ismailov-M11/tezyubor_backend_dev.git"
          git push personal HEAD:main --force
